name: Update Friday Dashboard Stats

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout dashboard repo
      uses: actions/checkout@v4
      
    - name: Checkout workspace repo (public)
      uses: actions/checkout@v4
      with:
        repository: fabioivandro04-lgtm/friday-backup
        path: workspace
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Generate stats from workspace
      run: node scripts/update-stats.js
      
    - name: Commit and push changes
      run: |
        git config --local user.email "friday@unidreamity.com"
        git config --local user.name "Friday Bot"
        git add data/
        git diff --staged --quiet || (git commit -m "🤖 Auto-update stats: $(date '+%Y-%m-%d %H:%M:%S')" && git push)
